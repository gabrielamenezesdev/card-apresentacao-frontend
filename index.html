<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Apresentação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <button id="btn-mudar">Mudar tema</button>
    </div>
    <article class="card-perfil">

        <header>
            <img class="avatar" src="img/foto-dev.jpg" alt="Foto do Desenvolvedor(a)">
        </header>

        <section>
            <h1>Desenvolvedor (a):</h1>
            <p>Nome: Marília Gabriela</p>
        </section>

        <footer>
            <button id="btn-status">Ver Status</button>
            <p id="msg-status" style="display: none;"></p>
        </footer>
    </article>
    <script src="script.js"></script>
</body>
</html>
